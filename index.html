<!-- Desktop shortcuts: Terminal opens shell; info opens shell + neofetch -->
<div id="desktop">
    <div class="file-icon" id="terminal-shortcut">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zM7.5 15l-1.41-1.41L8.67 11 6.09 8.41 7.5 7l4 4-4 4z"/>

    </div>
    <div class="file-icon" id="info-shortcut">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>

<!-- Single draggable terminal window (hidden until opened from desktop) -->
<div id="terminal-shell" class="is-hidden">
    <div class="title-bar" id="terminal-title-bar">
        <div class="window-controls">
            <div class="control-btn close-btn" title="Close"></div>
        </div>
        <div class="window-title">guest@ubuntu: ~</div>
    </div>
    <div class="window-body" id="terminal">
        <div id="history"></div>
        <div class="prompt-line" id="prompt-container">
            <span class="prompt-prefix">guest@ubuntu:~$</span>
            <div class="input-container">
                <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">
                <span id="visual-input"></span><span class="cursor"></span>
            </div>
        </div>
    </div>
</div>

<!-- Full-screen black overlay triggered by rm -rf / -->
<div id="blackout" class="is-hidden" aria-hidden="true"></div>
